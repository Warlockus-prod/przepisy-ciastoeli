# Nginx vhost for przepisy.ciastoeli.pl (VPS #2 / Hetzner FSN1)
#
# VPS pattern: shared `nginx_server` does SNI stream-routing on :443.
# HTTP server blocks listen on 8443 (loopback). External 443 → stream → 127.0.0.1:8443.
#
# Install:
#   1. cp przepisy.nginx.conf /opt/repos/nginx_server/conf.d/przepisy.conf
#   2. add `przepisy.ciastoeli.pl  local_https;` to /opt/repos/nginx_server/stream.d/01-sni-routing.conf map
#   3. docker exec nginx_server nginx -t && docker exec nginx_server nginx -s reload  (NEVER restart!)

server {
    listen 80;
    listen [::]:80;
    server_name przepisy.ciastoeli.pl;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 8443 ssl;
    listen [::]:8443 ssl;
    http2 on;
    server_name przepisy.ciastoeli.pl;

    ssl_certificate     /opt/repos/certs/certs/przepisy.ciastoeli.pl.crt;
    ssl_certificate_key /opt/repos/certs/private/przepisy.ciastoeli.pl.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    port_in_redirect off;
    absolute_redirect off;

    rewrite ^/(.*)/$ /$1 permanent;

    location /uploads/ {
        alias /opt/repos/przepisy/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /_next/static/ {
        proxy_pass http://172.17.0.1:4310;
        proxy_set_header Host $host;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://172.17.0.1:4310;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 60s;
    }

    client_max_body_size 20M;
}
