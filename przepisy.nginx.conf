# Nginx vhost for przepisy.ciastoeli.pl
# Bind-mounted into shared nginx_server container at /etc/nginx/conf.d/przepisy.conf
# Reload (no restart!): docker exec nginx_server nginx -s reload

server {
    listen 80;
    listen [::]:80;
    server_name przepisy.ciastoeli.pl www.przepisy.ciastoeli.pl;

    # ACME challenge for certbot renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
    }

    location / {
        return 301 https://przepisy.ciastoeli.pl$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.przepisy.ciastoeli.pl;

    ssl_certificate     /opt/repos/certs/certs/przepisy.ciastoeli.pl.crt;
    ssl_certificate_key /opt/repos/certs/private/przepisy.ciastoeli.pl.key;

    return 301 https://przepisy.ciastoeli.pl$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name przepisy.ciastoeli.pl;

    ssl_certificate     /opt/repos/certs/certs/przepisy.ciastoeli.pl.crt;
    ssl_certificate_key /opt/repos/certs/private/przepisy.ciastoeli.pl.key;

    # Security
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Trailing slash → no
    rewrite ^/(.*)/$ /$1 permanent;

    # Static uploads — long cache
    location /uploads/ {
        alias /opt/repos/przepisy/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff";
        try_files $uri =404;
    }

    # Next.js public assets
    location /_next/static/ {
        proxy_pass http://172.17.0.1:4310;
        proxy_set_header Host $host;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://172.17.0.1:4310;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
        proxy_buffering on;
    }

    client_max_body_size 20M;
}
