services:
  postgres:
    image: postgres:16-alpine
    container_name: ciastoeli-pg-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: przepisy
      POSTGRES_USER: przepisy
      POSTGRES_PASSWORD: dev_password_change_me
    volumes:
      - pgdata-dev:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U przepisy -d przepisy"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata-dev:
