services:
  postgres:
    image: postgres:16-alpine
    container_name: przepisy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    container_name: przepisy-migrate
    image: przepisy-app:latest
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env.production
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    command: ["node", "scripts/db-init.mjs"]

  app:
    container_name: przepisy-app
    image: przepisy-app:latest
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env.production
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "172.17.0.1:4310:4310"
    volumes:
      - ./uploads:/app/data/uploads
      - ./logs:/app/runtime-logs
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:4310/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 40s
      retries: 5

volumes:
  pgdata:
